<header class="relative min-h-screen flex items-center justify-center text-center overflow-hidden px-6" style="background-color: #0f1a14;">
    <video id="hero-vid" autoplay muted loop playsinline style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scale(1.05);">
        <source src="cartagena (1).mp4" type="video/mp4">
    </video>

    <div class="absolute inset-0 bg-gradient-to-bottom rgba(0,0,0,.65) to rgba(0,0,0,.8) backdrop-blur-[1px]" style="background: linear-gradient(to bottom, rgba(0,0,0,.65), rgba(0,0,0,.4), rgba(0,0,0,.8));"></div>

    <div class="relative z-10 w-full max-w-5xl mx-auto pt-16">
        <div class="reveal">
            <span class="inline-flex items-center gap-2 px-5 py-2 rounded-full bg-emerald-500/10 border border-emerald-400/20 text-emerald-300 text-xs uppercase tracking-widest backdrop-blur-md">
                <i class="fas fa-earth-americas"></i> Estándar de Calidad con Proyección Nacional
            </span>
        </div>

        <h1 class="font-display reveal text-5xl md:text-7xl text-white font-light mt-8 leading-tight">
            Espacios impecables.<br>
            <span class="text-emerald-400 font-normal">Alta Gama Corporativa</span>
        </h1>

        <p class="reveal text-white/90 text-lg md:text-xl max-w-2xl mx-auto mt-8 leading-relaxed font-light">
            Soluciones integrales y protocolos institucionales premium para hoteles, complejos empresariales y proyectos industriales desde el corazón de Cartagena.
        </p>

        <div class="reveal flex flex-col sm:flex-row gap-5 justify-center mt-12">
            <a href="#contacto" class="px-8 py-4 rounded-full text-white font-medium shadow-2xl transition hover:scale-105" style="background:var(--eco)">
                Solicitar Cotización Nacional
            </a>
        </div>
    </div>
</header>
